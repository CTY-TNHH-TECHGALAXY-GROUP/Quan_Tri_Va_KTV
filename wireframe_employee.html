<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wireframe - App Nhân Viên</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f1f5f9;
      margin: 0;
      display: flex;
      justify-content: center;
      padding: 20px;
    }
    
    /* Simulate mobile screen */
    .mobile-container {
      width: 100%;
      max-width: 400px;
      background-color: #f8fafc;
      border: 10px solid #1e293b;
      border-radius: 36px;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      position: relative;
      height: 800px;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: white;
      border-bottom: 1px solid #e2e8f0;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .back-btn {
      width: 32px; height: 32px; border-radius: 16px; display: flex; align-items: center; justify-content: center; background: #f1f5f9; color: #64748b; font-weight: bold;
    }
    .header h1 { margin: 0; font-size: 16px; color: #0f172a; }
    .header p { margin: 2px 0 0; font-size: 11px; color: #64748b; }

    .content {
      padding: 16px;
      overflow-y: auto;
      flex: 1;
    }

    /* Progress */
    .progress-card {
      background: white; border: 1px solid #e2e8f0; border-radius: 16px; padding: 16px; margin-bottom: 20px; box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .progress-bar { height: 10px; background: #f1f5f9; border-radius: 5px; margin-top: 10px; overflow: hidden; }
    .progress-fill { height: 100%; width: 40%; background: linear-gradient(90deg, #06b6d4, #3b82f6); border-radius: 5px; }

    /* Group: Đột xuất */
    .group-urgent { margin-bottom: 24px; }
    .group-urgent-header {
      background: #fef2f2; border: 1px solid #fecaca; border-bottom: none; border-radius: 12px 12px 0 0; padding: 12px 16px; display: flex; align-items: center; gap: 8px;
    }
    .pulse-dot { width: 10px; height: 10px; background: #ef4444; border-radius: 5px; }
    .group-urgent-header h2 { margin: 0; font-size: 12px; font-weight: bold; color: #dc2626; text-transform: uppercase; }
    
    .group-body {
      background: white; border: 1px solid #e2e8f0; border-radius: 0 0 12px 12px; overflow: hidden;
    }
    .group-urgent .group-body { border-color: #fecaca; }

    /* Group: Cố định */
    .group-normal { margin-bottom: 24px; }
    .group-normal-header {
      background: #e2e8f0; padding: 12px 16px; border-radius: 12px 12px 0 0;
    }
    .group-normal-header h2 { margin: 0; font-size: 12px; font-weight: bold; color: #334155; text-transform: uppercase; }

    /* Task row */
    .task-row {
      padding: 14px 16px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: flex-start;
    }
    .task-row:last-child { border-bottom: none; }
    .task-info { flex: 1; padding-right: 12px; }
    .task-title { font-size: 14px; font-weight: 500; color: #1e293b; margin-bottom: 4px; }
    .task-meta { font-size: 11px; color: #94a3b8; display: flex; align-items: center; gap: 4px; }
    
    /* Action button / Camera */
    .btn-camera {
      width: 44px; height: 44px; border-radius: 12px; background: #f8fafc; border: 1px dashed #cbd5e1; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #94a3b8; flex-shrink: 0;
    }
    .btn-camera.has-photo {
      border: 1px solid #3b82f6; background: #eff6ff; color: #3b82f6;
    }
    .btn-done {
      width: 44px; height: 44px; border-radius: 12px; background: #10b981; border: none; display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; flex-shrink: 0;
    }

    .btn-submit {
      width: 100%; padding: 10px; margin-top: 10px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 13px;
    }

  </style>
</head>
<body>

  <div class="mobile-container">
    
    <!-- Top Nav -->
    <div class="header">
      <div class="back-btn">←</div>
      <div>
        <h1>📋 Công Việc Hôm Nay</h1>
        <p>Thứ Năm, 23/07</p>
      </div>
    </div>

    <div class="content">
      <!-- Progress -->
      <div class="progress-card">
        <div style="display: flex; justify-content: space-between; align-items: center; font-size: 13px;">
          <span style="color: #64748b; font-weight: 500;">Hoàn thành</span>
          <span style="color: #06b6d4; font-weight: bold;">2/5 (40%)</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill"></div>
        </div>
      </div>

      <!-- ĐỘT XUẤT -->
      <div class="group-urgent">
        <div class="group-urgent-header">
          <div class="pulse-dot"></div>
          <h2>Các việc đột xuất phát sinh</h2>
        </div>
        <div class="group-body">
          <div class="task-row">
            <div class="task-info">
              <div class="task-title">Sửa ống nước bồn rửa tay phòng VIP 1</div>
              <div class="task-meta">📷 Tối thiểu 1 ảnh</div>
              <button class="btn-submit">Gửi hoàn thành</button>
            </div>
            <div class="btn-camera has-photo">📸</div>
          </div>
        </div>
      </div>

      <!-- ĐỊNH KỲ: VỆ SINH CHUNG -->
      <div class="group-normal">
        <div class="group-normal-header">
          <h2>VỆ SINH CHUNG</h2>
        </div>
        <div class="group-body">
          <div class="task-row">
            <div class="task-info">
              <div class="task-title">Lau dọn sảnh lễ tân</div>
              <div class="task-meta">📷 Tối thiểu 1 ảnh</div>
            </div>
            <div class="btn-done">✓</div>
          </div>
          
          <div class="task-row">
            <div class="task-info">
              <div class="task-title" style="color: #0f172a;">Kiểm tra khăn trải giường</div>
              <div class="task-meta">📷 Tối thiểu 1 ảnh</div>
            </div>
            <div class="btn-camera">📸</div>
          </div>
        </div>
      </div>
      
    </div>
  </div>

</body>
</html>
